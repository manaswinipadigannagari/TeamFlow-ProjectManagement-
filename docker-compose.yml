version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: teamflow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: teamflow

  redis:
    image: redis:7.0-alpine
    container_name: teamflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
