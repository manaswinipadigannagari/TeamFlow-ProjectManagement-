name: TeamFlow CI/CD Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Monorepo Dependencies
        run: |
          npm install
          npm install --prefix frontend
          npm install --prefix backend

      - name: Run Root Formatting checks
        run: npx prettier --check .

      - name: Lint Frontend
        run: npm run lint --prefix frontend

      - name: Lint Backend
        run: npm run lint --prefix backend

      - name: Build Frontend
        run: npm run build --prefix frontend

      - name: Build Backend
        run: npm run build --prefix backend

      - name: Run Backend Tests
        run: npm run test --prefix backend
        env:
          MONGO_URI: mongodb://localhost:27017/teamflow-test
          JWT_ACCESS_SECRET: test_access_secret_12389741239847129834
          JWT_REFRESH_SECRET: test_refresh_secret_12389741239847129834
          NODE_ENV: test
